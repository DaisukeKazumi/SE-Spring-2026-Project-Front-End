<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SE Spring 2026 — Frontend App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ===== HEADER ===== -->
    <header>
      <div class="header-inner">
        <h1>SE Spring 2026</h1>
        <nav>
          <span id="user-info" class="user-info"></span>
          <button id="logout-btn" class="btn btn-secondary hidden">Log out</button>
        </nav>
      </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>

      <!-- Auth section (hidden after login) -->
      <section id="auth-section" class="card">
        <h2>Sign Up / Log In</h2>

        <form id="auth-form">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />

          <div class="btn-group">
            <button type="button" id="signup-btn" class="btn btn-primary">Sign Up</button>
            <button type="button" id="login-btn"  class="btn btn-secondary">Log In</button>
          </div>
        </form>

        <p id="auth-message" class="message"></p>
      </section>

      <!-- Data section (visible after login) -->
      <section id="data-section" class="card hidden">
        <h2>Your Data</h2>

        <form id="insert-form">
          <label for="data-input">Add a new post</label>
          <input type="text" id="data-input" placeholder="Enter something…" required />
          <button type="submit" class="btn btn-primary">Insert</button>
        </form>

        <p id="data-message" class="message"></p>

        <h3>Existing Entries</h3>
        <ul id="data-list" class="data-list"></ul>
      </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
      <p>&copy; 2026 SE Spring Project</p>
    </footer>

    <!-- Supabase JS client (CDN — no build step required) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App logic -->
    <script src="script.js"></script>

  </body>
</html>
